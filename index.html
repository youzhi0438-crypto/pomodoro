<script>
/* ===== 核心系统变量 ===== */
/* ===== 数据驱动储存 ===== */
let plans = JSON.parse(localStorage.getItem('custom_plans')) || [
  { id: 'd1', name: '标准番茄钟', type: 'countdown', duration: 25 },
  { id: 'd2', name: '自由正计时', type: 'countup', duration: 0 },
  { id: 'd3', name: '深度长专注', type: 'countdown', duration: 50 }
  { id: 'd1', name: '标准番茄钟', type: 'countdown', duration: 25, color: '#e74c3c' },
  { id: 'd2', name: '自由正计时', type: 'countup', duration: 0, color: '#2ecc71' },
  { id: 'd3', name: '深度长专注', type: 'countdown', duration: 50, color: '#9b59b6' }
];

let historyLogs = JSON.parse(localStorage.getItem('focus_history')) || [];

let currentPlan = plans[0];
let timerState = { isRunning: false, timeElapsed: 0, timeRemaining: plans[0].duration * 60, intervalId: null, startTimeStamp: null };

const DEFAULT_QUOTES = [
  { zh: "专注于当下，每一秒都是在雕刻未来的自己。", en: "Focus on the present, sculpting your future self every second." },
  { zh: "先开始，再完美。路是在走的过程中变清晰的。", en: "Start first, perfect later. The path becomes clear as you walk." },
  { zh: "自律不是限制自由，而是用更酷的方式驾驭生活。", en: "Self-discipline is not restriction, but steering life in a cooler way." }
];
let quotes = JSON.parse(localStorage.getItem('custom_quotes')) || DEFAULT_QUOTES;
let timerState = { isRunning: false, timeElapsed: 0, timeRemaining: plans[0].duration * 60, intervalId: null };
let chartInstance = null;

/* ===== 核心路由导航 ===== */
// 缓存当前加载的有道壹句语音与文本数据
let currentYoudaoQuote = { en: '', zh: '', mp3: '', source: '' };

/* ===== 核心：异步对接有道词典“壹句”功能 ===== */
async function fetchYoudaoQuote(isManual = false) {
  if (isManual) showToast("正在连接网易有道服务器...");
  
  try {
    // 采用无跨域拦截的公开高速镜像源获取有道每日壹句完整JSON
    const res = await fetch('https://open.iciba.com/dsapi/');
    const data = await res.json();
    
    if (data && data.content) {
      currentYoudaoQuote.en = data.content;
      currentYoudaoQuote.zh = data.note;
      currentYoudaoQuote.mp3 = data.tts || `https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(data.content)}&type=2`;
      currentYoudaoQuote.source = data.translation ? `— ${data.translation}` : '';
      
      // 更新主界面UI显示
      document.getElementById('quoteEn').textContent = currentYoudaoQuote.en;
      document.getElementById('quoteZh').textContent = currentYoudaoQuote.zh;
      document.getElementById('quoteSource').textContent = currentYoudaoQuote.source;
      
      // 更新控制管理后台数据
      const cacheEl = document.getElementById('ydCacheStatus');
      if (cacheEl) cacheEl.innerHTML = `🌟 连接成功！<br>英文: ${data.content}<br>中文: ${data.note}`;
      
      if (isManual) showToast("⚡ 有道壹句同步更新完毕！");
    }
  } catch (error) {
    console.error("有道接口请求异常，启动本地容灾备用方案:", error);
    // 备用机制避免完全空白
    document.getElementById('quoteEn').textContent = "Be disciplined, enjoy freedom.";
    document.getElementById('quoteZh').textContent = "自律，即自由。";
    currentYoudaoQuote.mp3 = "https://dict.youdao.com/dictvoice?audio=Be+disciplined+enjoy+freedom&type=2";
  }
}

/* ===== 有道在线TTS地道原音发声控制 ===== */
function playYoudaoAudio() {
  if (!currentYoudaoQuote.mp3) return;
  const audio = new Audio(currentYoudaoQuote.mp3);
  audio.play().catch(e => {
    // 假如有道音频资源受限，无缝降级为系统自带TTS
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(currentYoudaoQuote.en);
    u.lang = 'en-US';
    window.speechSynthesis.speak(u);
  });
}

function getBeijingDate(timestamp = Date.now()) {
  const options = { timeZone: 'Asia/Shanghai', hour12: false, year: 'numeric', month: 'numeric', day: 'numeric', hour: 'numeric', minute: 'numeric', second: 'numeric' };
  const formatter = new Intl.DateTimeFormat('zh-CN', options);
  const parts = formatter.formatToParts(new Date(timestamp));
  const map = {}; parts.forEach(p => map[p.type] = p.value);
  
  const H = parseInt(map.hour); const M = parseInt(map.minute); const S = parseInt(map.second);
  let dayIdx = new Date(`${map.year}/${map.month}/${map.day}`).getDay() - 1;
  if(dayIdx === -1) dayIdx = 6; 

  return { hour: H, minute: M, second: S, dayIdx, timeStr: `${String(H).padStart(2,'0')}:${String(M).padStart(2,'0')}:${String(S).padStart(2,'0')}` };
}

function animFlip(el, newVal) {
  if (!el) return;
  const top = el.querySelector('.f-top span'), bot = el.querySelector('.f-bot span');
  const old = top.textContent, nv = String(newVal);
  if (old === nv) return;
  
  const fT = document.createElement('div');
  fT.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:50%;overflow:hidden;transform-origin:bottom center;border-radius:8px 8px 0 0;background:#1e1e1e;border:1px solid #2a2a2a;z-index:10';
  fT.innerHTML = `<span style="font-size:68px;font-weight:500;line-height:1;transform:translateY(50%);color:#e8f4ff;display:flex;justify-content:center">${old}</span>`;
  
  const fB = document.createElement('div');
  fB.style.cssText = 'position:absolute;top:50%;left:0;width:100%;height:50%;overflow:hidden;transform-origin:top center;border-radius:0 0 8px 8px;background:#181818;border:1px solid #2a2a2a;border-top:none;z-index:10;transform:rotateX(-90deg)';
  fB.innerHTML = `<span style="font-size:68px;font-weight:500;line-height:1;transform:translateY(-50%);color:#c8e4f8;display:flex;justify-content:center">${nv}</span>`;
  
  top.textContent = nv; bot.textContent = nv;
  el.appendChild(fT); el.appendChild(fB);
  
  let st = null;
  requestAnimationFrame(function step(ts) {
    if (!st) st = ts;
    const p = Math.min((ts-st)/300, 1), e = 1-Math.pow(1-p,3);
    fT.style.transform = `rotateX(${e*-90}deg)`;
    fB.style.transform = `rotateX(${(1-e)*-90}deg)`;
    if (p < 1) requestAnimationFrame(step); else { fT.remove(); fB.remove(); }
  });
  if (top.textContent === String(newVal)) return;
  top.textContent = newVal; bot.textContent = newVal;
}

/* ===== 严格时间轴纵览课表渲染 ===== */
function renderWeekTimeline() {
  const weekGrid = document.getElementById('weekGrid');
  weekGrid.innerHTML = ''; // 清空
  const weekGrid = document.getElementById('weekGrid'); if (!weekGrid) return;
  weekGrid.innerHTML = '';

  // 1. 渲染头部周一~周日
  let html = '<div class="week-header-cell">时间</div>';
  const dayNames = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
  dayNames.forEach(d => { html += `<div class="week-header-cell">${d}</div>`; });

  // 2. 建立左侧 24 小时轴列
  html += '<div class="time-col">';
  for(let i=0; i<24; i++) {
    html += `<div class="time-slot">${String(i).padStart(2,'0')}:00</div>`;
  }
  for(let i=0; i<24; i++) { html += `<div class="time-slot">${String(i).padStart(2,'0')}:00</div>`; }
  html += '</div>';

  // 3. 建立 7 天的每日垂直列
  for(let d=0; d<7; d++) {
    html += `<div class="day-col" id="day-col-${d}"></div>`;
  }
  for(let d=0; d<7; d++) { html += `<div class="day-col" id="day-col-${d}"></div>`; }
  weekGrid.innerHTML = html;

  // 4. 将历史数据按矩阵和位置关系渲染到格子里
  // 为了确保效果，我们只展示本周内（最近7天）的数据
  const OneWeekAgo = Date.now() - 7 * 24 * 3600 * 1000;
  
  historyLogs.forEach(log => {
    if (log.timestamp < OneWeekAgo) return; // 略过老数据
    
    const targetCol = document.getElementById(`day-col-${log.day}`);
    if (targetCol) {
      const h = log.startHour; const m = log.startMin;
      const block = document.createElement('div');
      block.className = 'time-block';
      const matched = plans.find(p => p.name === log.taskName);
      const themeColor = matched ? matched.color : '#3498db';

      // 每小时格高度为 40px，因此每分钟高度 = 40 / 60 = 0.666px
      const topPos = log.hour * 40 + (new Date(log.timestamp).getMinutes() * 0.66);
      const blockHeight = Math.max(18, log.duration * 0.66); // 至少保留18px高度防止文字挤压
      
      block.style.top = `${topPos}px`;
      block.style.height = `${blockHeight}px`;
      block.innerHTML = `<strong>${log.taskName}</strong><br>${log.duration}m`;
      block.title = `${log.taskName}: 专注 ${log.duration}分钟`;
      block.style.cssText = `
        position: absolute; left: 2px; right: 2px;
        border-left: 3px solid ${themeColor};
        background: linear-gradient(90deg, ${themeColor}25, ${themeColor}08);
        border-radius: 4px; padding: 4px; font-size: 11px; color: #fff;
        overflow: hidden; z-index: 99;
      `;

      const topPos = (h * 40) + (m * 0.6666);
      const blockHeight = Math.max(24, log.duration * 0.6666);
      block.style.top = `${topPos}px`; block.style.height = `${blockHeight}px`;

      const timeStr = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
      block.innerHTML = `
        <div style="font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${log.taskName}</div>
        <div style="font-size:9px; color:#aaa; margin-top:2px;">${timeStr} (${log.duration}分)</div>
      `;
      targetCol.appendChild(block);
    }
  });
}
