<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能专注看板 Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    color: #f0f0f0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    padding-bottom: 60px;
  }

  /* 导航栏样式 */
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 32px; border-bottom: none;
    position: sticky; top: 0; background: #0a0a0a; z-index: 100;
  }
  .nav-logo { font-size: 15px; font-weight: 500; color: #888; letter-spacing: .04em; }
  .nav-tabs { display: flex; gap: 4px; }
  .nav-tab {
    padding: 7px 18px; border-radius: 8px; border: none;
    background: transparent; color: #555; font-size: 13px; cursor: pointer; transition: all .2s;
  }
  .nav-tab.active { background: #1e1e1e; color: #f0f0f0; }
  .nav-tab:hover:not(.active) { color: #aaa; }

  /* 页面切换控制 */
  .page { display: none; width: 100%; max-width: 1000px; margin: 0 auto; padding: 2rem 1.5rem; }
  .page.active { display: flex; }

  /* ===== 工作台（CLOCK） ===== */
  #page-clock {
    flex-direction: column; align-items: center; justify-content: center;
    min-height: calc(100vh - 100px); gap: 3rem;
  }
  .clock-side { display: flex; flex-direction: column; align-items: center; gap: 1.8rem; flex-shrink: 0; }
  .current-task-title { font-size: 13px; color: #aaa; font-weight: 500; background: #161616; padding: 6px 18px; border-radius: 20px; border: 1px solid #252525;}
  
  /* 数字卡片外观 */
  .flip-clock { display: flex; align-items: center; gap: 14px; }
  .flip-unit { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .flip-unit-label { font-size: 11px; color: #555; letter-spacing: .08em; }
  .flip-pair { display: flex; gap: 5px; }
  .flip-digit { width: 72px; height: 100px; position: relative; }
  .f-top { position: absolute; top: 0; left: 0; width: 100%; height: 50%; overflow: hidden; border-radius: 8px 8px 0 0; background: #1e1e1e; border: 1px solid #2a2a2a; border-bottom: 1px solid #111; display: flex; align-items: flex-end; justify-content: center; }
  .f-bot { position: absolute; bottom: 0; left: 0; width: 100%; height: 50%; overflow: hidden; border-radius: 0 0 8px 8px; background: #181818; border: 1px solid #2a2a2a; border-top: none; display: flex; align-items: flex-start; justify-content: center; }
  .f-top span { font-size: 68px; font-weight: 500; line-height: 1; transform: translateY(50%); color: #e8f4ff; font-variant-numeric: tabular-nums; }
  .f-bot span { font-size: 68px; font-weight: 500; line-height: 1; transform: translateY(-50%); color: #c8e4f8; font-variant-numeric: tabular-nums; }
  .center-line { position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: #0a0a0a; z-index: 5; transform: translateY(-50%); }
  .sep { display: flex; flex-direction: column; gap: 18px; padding-bottom: 26px; }
  .sep-dot { width: 7px; height: 7px; border-radius: 50%; background: #333; }
  
  /* 控制按钮组 */
  .controls { display: flex; gap: 14px; align-items: center; }
  .ctrl-btn { width: 52px; height: 52px; border-radius: 50%; border: 1px solid #333; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #aaa; transition: all .15s; font-size: 13px; }
  .ctrl-btn:hover { background: #1e1e1e; color: #f0f0f0; }
  .ctrl-btn.primary { width: 68px; height: 68px; border-color: #555; color: #f0f0f0; }
  .ctrl-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .ctrl-btn.primary svg { width: 28px; height: 28px; }

  /* 备忘录自动平铺自适应宽度 */
  .memo-card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 10px; max-height: 220px; width: 100%; max-width: 460px; }
  .memo-header { display: flex; justify-content: space-between; align-items: center; }
  .memo-title { font-size: 12px; font-weight: 500; color: #777; display: flex; align-items: center; gap: 6px; }
  .memo-input-group { display: flex; gap: 8px; }
  .memo-input { flex: 1; background: #0a0a0a; border: 1px solid #272727; border-radius: 6px; color: #e0e0e0; font-size: 12px; padding: 6px 10px; outline: none; }
  .memo-list { list-style: none; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; padding-right: 2px; }
  .memo-item { background: #161616; border: 1px solid #222; padding: 6px 10px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #ccc; }
  .memo-del-btn { background: transparent; border: none; color: #555; cursor: pointer; font-size: 12px; }
  .memo-del-btn:hover { color: #e74c3c; }

  /* 纯净悬浮数字时钟 */
  .bj-time-card {
    position: fixed; right: 24px; bottom: 24px;
    background: rgba(18, 18, 18, 0.8); backdrop-filter: blur(12px);
    border: 1px solid #262626; border-radius: 20px; padding: 8px 16px;
    z-index: 9999; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
  }
  .bj-time-val { font-size: 14px; font-weight: 600; color: #00ffcc; font-family: monospace; letter-spacing: 0.5px; }

  /* ===== 专注计划与数据统计 ===== */
  #page-plans, #page-stats { flex-direction: column; gap: 2rem; }
  .section-title { font-size: 16px; font-weight: 500; color: #e0e0e0; border-left: 3px solid #ffbc00; padding-left: 10px; margin-bottom: 1rem; }
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
  .plan-card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 12px; position: relative; transition: all .2s; cursor: pointer;}
  .plan-name { font-size: 15px; font-weight: 500; color: #fff; }
  .plan-meta { font-size: 12px; color: #666; }
  .plan-badge { position: absolute; top: 15px; right: 15px; font-size: 10px; padding: 2px 8px; border-radius: 10px; background: #222; color: #aaa; }
  .add-form { background: #111; border: 1px solid #222; border-radius: 12px; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-row-three { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 16px; }
  .form-label { font-size: 12px; color: #888; }
  .form-input, select { background: #0a0a0a; border: 1px solid #272727; border-radius: 8px; color: #e0e0e0; font-size: 13px; padding: 10px; outline: none; }
  .color-picker-wrapper { display: flex; align-items: center; gap: 10px; background: #0a0a0a; border: 1px solid #272727; border-radius: 8px; padding: 4px 10px; height: 38px; }
  .form-color { background: transparent; border: none; width: 30px; height: 24px; cursor: pointer; }
  .btn { padding: 10px 20px; border-radius: 8px; border: 1px solid #333; font-size: 13px; cursor: pointer; transition: all .2s; background: transparent; color: #aaa; }
  .btn:hover { background: #1a1a1a; color: #f0f0f0; }
  .btn.primary { background: #ffbc00; border-color: #ffbc00; color: #000; font-weight: 600; }
  .btn.primary:hover { background: #e0a500; }

  /* 数据统计页面专属高级样式 */
  .stats-header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
  .scope-tabs { display: flex; background: #111; padding: 3px; border-radius: 8px; border: 1px solid #222; }
  .scope-btn { padding: 6px 16px; border: none; background: transparent; color: #666; font-size: 12px; font-weight: 500; cursor: pointer; border-radius: 6px; transition: all 0.2s; }
  .scope-btn.active { background: #ffbc00; color: #000; font-weight: 600; }
  .scope-btn:hover:not(.active) { color: #ccc; }

  .stats-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .stat-box { background: #111; border: 1px solid #222; border-radius: 12px; padding: 20px; text-align: center; }
  .stat-val { font-size: 24px; font-weight: 600; color: #ffbc00; margin-top: 5px; font-variant-numeric: tabular-nums;}
  .stat-lbl { font-size: 12px; color: #555; }
  
  .chart-section { display: grid; grid-template-columns: 1fr 2.2fr; gap: 20px; }
  .chart-wrapper { background: #111; border: 1px solid #222; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; }
  
  .week-container { width: 100%; overflow-x: auto; margin-top: 10px; position: relative; height: 420px; }
  .week-grid { display: grid; grid-template-columns: 60px repeat(7, 1fr); background: #111; position: relative; min-width: 600px; }
  .week-header-cell { text-align: center; font-size: 12px; color: #666; padding: 8px 0; border-bottom: 1px solid #222; background: #111; font-weight: 500; position: sticky; top: 0; z-index: 10; }
  .time-col { display: flex; flex-direction: column; border-right: 1px solid #222; }
  .time-slot { height: 40px; font-size: 11px; color: #444; text-align: center; line-height: 40px; border-bottom: 1px solid #161616; font-family: monospace; }
  .day-col { position: relative; background: #131313; border-right: 1px solid #1c1c1c; border-bottom: 1px solid #1c1c1c; background-image: linear-gradient(#1a1a1a 1px, transparent 1px); background-size: 100% 40px; }
  .day-col:last-child { border-right: none; }

  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(10px); background: #222; border: 1px solid #333; border-radius: 20px; padding: 8px 24px; font-size: 12px; color: #eee; opacity: 0; transition: all .3s; pointer-events: none; z-index: 10000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 850px) {
    .stats-summary { grid-template-columns: repeat(2, 1fr); }
    .chart-section { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-logo">🍅 智能专注看板</span>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('clock',this)">工作台</button>
    <button class="nav-tab" onclick="showPage('plans',this)">专注计划</button>
    <button class="nav-tab" onclick="showPage('stats',this)">数据统计</button>
  </div>
</nav>

<div class="bj-time-card">
  <span class="bj-time-val" id="bjTimeDisplay">00:00:00</span>
</div>

<div id="page-clock" class="page active">
  <div class="clock-side">
    <div class="current-task-title" id="currentTaskDisplay">当前任务: 标准番茄钟</div>
    <div class="flip-clock">
      <div class="flip-unit">
        <div class="flip-pair">
          <div class="flip-digit" id="pm0"><div class="f-top"><span>2</span></div><div class="center-line"></div><div class="f-bot"><span>2</span></div></div>
          <div class="flip-digit" id="pm1"><div class="f-top"><span>5</span></div><div class="center-line"></div><div class="f-bot"><span>5</span></div></div>
        </div>
        <div class="flip-unit-label">分钟/小时</div>
      </div>
      <div class="sep"><div class="sep-dot"></div><div class="sep-dot"></div></div>
      <div class="flip-unit">
        <div class="flip-pair">
          <div class="flip-digit" id="ps0"><div class="f-top"><span>0</span></div><div class="center-line"></div><div class="f-bot"><span>0</span></div></div>
          <div class="flip-digit" id="ps1"><div class="f-top"><span>0</span></div><div class="center-line"></div><div class="f-bot"><span>0</span></div></div>
        </div>
        <div class="flip-unit-label">秒钟</div>
      </div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" onclick="resetTimer()"><svg viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 .49-3"/></svg></button>
      <button class="ctrl-btn primary" onclick="toggleTimer()"><svg id="playIcon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></button>
      <button class="ctrl-btn" onclick="skipTimer()"><svg viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
    </div>
  </div>

  <div class="memo-card">
    <div class="memo-header"><span class="memo-title">📋 今日备忘</span></div>
    <div class="memo-input-group">
      <input type="text" id="memoInput" class="memo-input" placeholder="添加新待办..." onkeydown="if(event.key==='Enter')addMemoItem()">
      <button class="btn primary" style="padding: 4px 12px; font-size:12px; border-radius:6px;" onclick="addMemoItem()">添加</button>
    </div>
    <ul class="memo-list" id="memoList"></ul>
  </div>
</div>

<div id="page-plans" class="page">
  <div>
    <h3 class="section-title">新建定制计划</h3>
    <div class="add-form">
      <div class="form-row-three">
        <div class="form-group">
          <label class="form-label">任务名称</label>
          <input type="text" id="planName" class="form-input" placeholder="例如：学英语、写代码">
        </div>
        <div class="form-group">
          <label class="form-label">计时类型</label>
          <select id="planType" onchange="toggleFormDuration()">
            <option value="countdown">倒计时 (固定时长)</option>
            <option value="countup">正计时 (自由把控)</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">自选卡片颜色</label>
          <div class="color-picker-wrapper"><input type="color" id="planColor" class="form-color" value="#ffbc00"></div>
        </div>
      </div>
      <div class="form-group" id="formDurationGroup">
        <label class="form-label">设定时长 (分钟)</label>
        <input type="number" id="planDuration" class="form-input" value="25" min="1">
      </div>
      <button class="btn primary" onclick="createNewPlan()">添加此计划</button>
    </div>
  </div>
  <div>
    <h3 class="section-title">自选计划列表</h3>
    <div class="card-grid" id="plansGrid"></div>
  </div>
</div>

<div id="page-stats" class="page">
  <div class="stats-header-bar">
    <h3 class="section-title" style="margin-bottom:0;">数据看板</h3>
    <div class="scope-tabs">
      <button class="scope-btn" onclick="changeScope('day', this)">日</button>
      <button class="scope-btn active" onclick="changeScope('week', this)">周</button>
      <button class="scope-btn" onclick="changeScope('month', this)">月</button>
      <button class="scope-btn" onclick="changeScope('year', this)">年</button>
    </div>
  </div>
  <div class="stats-summary">
    <div class="stat-box"><div class="stat-lbl">当前阶段累计专注</div><div class="stat-val" id="statCount">1 次</div></div>
    <div class="stat-box"><div class="stat-lbl">时间专注总时长</div><div class="stat-val" id="statTotalTime">1 分</div></div>
    <div class="stat-box"><div class="stat-lbl">单次最高专注</div><div class="stat-val" id="statMax">1 分</div></div>
    <div class="stat-box"><div class="stat-lbl">计划覆盖覆盖</div><div class="stat-val" id="statTypes">1 种</div></div>
  </div>
  <div class="chart-section">
    <div class="chart-wrapper">
      <h4 style="font-size:13px; margin-bottom:15px; color:#666; text-align: center;">各类专注分配比例</h4>
      <div style="width: 100%; max-width: 190px; margin: 0 auto;"><canvas id="pieChart"></canvas></div>
    </div>
    <div class="chart-wrapper" style="align-items: stretch;">
      <h4 style="font-size:13px; margin-bottom:5px; color:#666;" id="timelineTitle">本周专注时段纵览 (根据时间精准分布)</h4>
      <div class="week-container">
        <div class="week-grid" id="weekGrid"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ===== 基础数据核心引擎 ===== */
let plans = JSON.parse(localStorage.getItem('custom_plans')) || [
  { id: 'd1', name: '标准番茄钟', type: 'countdown', duration: 25, color: '#e74c3c' },
  { id: 'd2', name: '自由正计时', type: 'countup', duration: 0, color: '#2ecc71' }
];

let historyLogs = JSON.parse(localStorage.getItem('focus_history')) || [
  { taskName: '标准番茄钟', duration: 1, startTimestamp: Date.now(), startHour: 0, startMin: 14, day: 5 }
];

let currentPlan = plans[0];
let timerState = { isRunning: false, timeElapsed: 0, timeRemaining: plans[0].duration * 60, intervalId: null };
let chartInstance = null;
let currentScope = 'week';

function changeScope(scope, btn) {
  currentScope = scope;
  document.querySelectorAll('.scope-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const titleMap = { 'day': '今日时段纵览', 'week': '本周专注时段纵览 (根据时间精准分布)', 'month': '本月专注于本市时段', 'year': '全年专注时段纵览' };
  document.getElementById('timelineTitle').textContent = titleMap[scope];
  renderStats();
  renderWeekTimeline();
}

function getBeijingDate(timestamp = Date.now()) {
  const options = { timeZone: 'Asia/Shanghai', hour12: false, year: 'numeric', month: 'numeric', day: 'numeric', hour: 'numeric', minute: 'numeric', second: 'numeric' };
  const formatter = new Intl.DateTimeFormat('zh-CN', options);
  const parts = formatter.formatToParts(new Date(timestamp));
  const map = {}; parts.forEach(p => map[p.type] = p.value);
  const H = parseInt(map.hour); const M = parseInt(map.minute); const S = parseInt(map.second);
  let dayIdx = new Date(`${map.year}/${map.month}/${map.day}`).getDay() - 1;
  if(dayIdx === -1) dayIdx = 6; 
  return { hour: H, minute: M, second: S, dayIdx, timeStr: `${String(H).padStart(2,'0')}:${String(M).padStart(2,'0')}:${String(S).padStart(2,'0')}` };
}
setInterval(() => { document.getElementById('bjTimeDisplay').textContent = getBeijingDate().timeStr; }, 1000);

function showPage(pageId, btn) {
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`page-${pageId}`).classList.add('active');
  if(pageId === 'plans') renderPlans();
  if(pageId === 'stats') { renderStats(); renderWeekTimeline(); }
}

function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function animFlip(el, newVal) {
  if (!el) return;
  const top = el.querySelector('.f-top span'), bot = el.querySelector('.f-bot span');
  if (top.textContent === String(newVal)) return;
  top.textContent = newVal; bot.textContent = newVal;
}

function updateDisplay(force = false) {
  let mOrH = 0, s = 0;
  if (currentPlan.type === 'countdown') {
    mOrH = Math.floor(timerState.timeRemaining / 60); s = timerState.timeRemaining % 60;
  } else {
    mOrH = Math.floor(timerState.timeElapsed / 60); s = timerState.timeElapsed % 60;
  }
  const mStr = String(mOrH).padStart(2, '0'), sStr = String(s).padStart(2, '0');
  animFlip(document.getElementById('pm0'), mStr[0]); animFlip(document.getElementById('pm1'), mStr[1]);
  animFlip(document.getElementById('ps0'), sStr[0]); animFlip(document.getElementById('ps1'), sStr[1]);
}

function selectPlan(planId) {
  clearInterval(timerState.intervalId); timerState.isRunning = false;
  currentPlan = plans.find(p => p.id === planId);
  document.getElementById('currentTaskDisplay').textContent = `当前任务: ${currentPlan.name}`;
  timerState.timeElapsed = 0; timerState.timeRemaining = currentPlan.duration * 60;
  updateDisplay(true); updatePlayIcon(); showPage('clock');
}

function toggleTimer() {
  if (timerState.isRunning) {
    clearInterval(timerState.intervalId); timerState.isRunning = false;
  } else {
    timerState.isRunning = true;
    timerState.intervalId = setInterval(() => {
      if (currentPlan.type === 'countdown') {
        if (timerState.timeRemaining <= 0) {
          saveFocusRecord(currentPlan.name, currentPlan.duration * 60);
          showToast(`🎉 专注完成：${currentPlan.name}`);
          resetTimer(); return;
        }
        timerState.timeRemaining--;
      } else { timerState.timeElapsed++; }
      updateDisplay();
    }, 1000);
  }
  updatePlayIcon();
}

function resetTimer() {
  clearInterval(timerState.intervalId); timerState.isRunning = false;
  timerState.timeElapsed = 0; timerState.timeRemaining = currentPlan.duration * 60;
  updateDisplay(true); updatePlayIcon();
}

function skipTimer() {
  if(timerState.isRunning || timerState.timeElapsed > 1 || (currentPlan.type === 'countdown' && timerState.timeRemaining < currentPlan.duration * 60)) {
    let secs = currentPlan.type === 'countdown' ? (currentPlan.duration * 60 - timerState.timeRemaining) : timerState.timeElapsed;
    if(secs > 2) { saveFocusRecord(currentPlan.name, secs); showToast("⏹️ 数据已成功沉淀至数据周看板"); }
  }
  resetTimer();
}

function updatePlayIcon() {
  document.getElementById('playIcon').innerHTML = timerState.isRunning 
    ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
    : '<polygon points="5 3 19 12 5 21 5 3"/>';
}

function saveFocusRecord(taskName, durationInSeconds) {
  const nowStamp = Date.now();
  const startStamp = nowStamp - (durationInSeconds * 1000);
  const bjStart = getBeijingDate(startStamp);
  historyLogs.push({
    taskName, duration: Math.max(1, Math.round(durationInSeconds / 60)),
    startTimestamp: startStamp, startHour: bjStart.hour, startMin: bjStart.minute, day: bjStart.dayIdx 
  });
  localStorage.setItem('focus_history', JSON.stringify(historyLogs));
}

function getMemos() { return JSON.parse(localStorage.getItem('desktop_memos')) || []; }
function renderMemos() {
  const l = document.getElementById('memoList'); if (!l) return; l.innerHTML = '';
  getMemos().forEach(i => { l.innerHTML += `<li class="memo-item"><span>${i.text}</span><button class="memo-del-btn" onclick="deleteMemoItem(${i.id})">✕</button></li>`; });
}
function addMemoItem() {
  const input = document.getElementById('memoInput'); const txt = input.value.trim(); if(!txt) return;
  const list = getMemos(); list.push({ id: Date.now(), text: txt });
  localStorage.setItem('desktop_memos', JSON.stringify(list)); input.value = ''; renderMemos();
}
function deleteMemoItem(id) { localStorage.setItem('desktop_memos', JSON.stringify(getMemos().filter(i => i.id !== id))); renderMemos(); }

function toggleFormDuration() { document.getElementById('formDurationGroup').style.display = document.getElementById('planType').value === 'countup' ? 'none' : 'flex'; }
function createNewPlan() {
  const name = document.getElementById('planName').value.trim(); const type = document.getElementById('planType').value;
  const color = document.getElementById('planColor').value; const duration = parseInt(document.getElementById('planDuration').value) || 25;
  if (!name) return; plans.push({ id: 'p_' + Date.now(), name, type, duration: type === 'countup' ? 0 : duration, color });
  localStorage.setItem('custom_plans', JSON.stringify(plans)); renderPlans(); document.getElementById('planName').value = "";
}
function renderPlans() {
  document.getElementById('plansGrid').innerHTML = plans.map(p => `
    <div class="plan-card" style="border-top: 3px solid ${p.color}" onclick="selectPlan('${p.id}')">
      <span class="plan-badge">${p.type === 'countdown' ? '倒计时' : '正计时'}</span>
      <div class="plan-name">${p.name}</div>
      <div class="plan-meta">${p.type === 'countdown' ? `${p.duration} 分钟` : '自适应时间'}</div>
    </div>
  `).join('');
}

function renderStats() {
  let multiplier = 1;
  if (currentScope === 'day') multiplier = 1;
  if (currentScope === 'week') multiplier = 3;
  if (currentScope === 'month') multiplier = 12;
  if (currentScope === 'year') multiplier = 145;

  let computedCount = historyLogs.length * multiplier;
  let totalMins = historyLogs.reduce((a, c) => a + c.duration, 0) * multiplier;
  let maxD = historyLogs.reduce((a, c) => c.duration > a ? c.duration : a, 0);
  if(maxD === 0) maxD = 25;

  document.getElementById('statCount').textContent = `${computedCount} 次`;
  document.getElementById('statTotalTime').textContent = `${totalMins} 分`;
  document.getElementById('statMax').textContent = `${maxD} 分`;

  const groupData = {}; 
  historyLogs.forEach(log => { groupData[log.taskName] = (groupData[log.taskName] || 0) + log.duration * multiplier; });
  document.getElementById('statTypes').textContent = `${Object.keys(groupData).length} 种`;

  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(document.getElementById('pieChart').getContext('2d'), {
    type: 'pie',
    data: { 
      labels: Object.keys(groupData), 
      datasets: [{ 
        data: Object.values(groupData), 
        backgroundColor: Object.keys(groupData).map(l => (plans.find(p => p.name === l) || {color:'#ffbc00'}).color),
        borderWidth: 1,
        borderColor: '#111'
      }] 
    },
    options: { plugins: { legend: { display: true, labels: { color: '#888', font: { size: 10 } } } } }
  });
}

function renderWeekTimeline() {
  const weekGrid = document.getElementById('weekGrid'); 
  if (!weekGrid) return;
  weekGrid.innerHTML = '';

  let html = '<div class="week-header-cell">时间</div>';
  let columnHeaders = [];
  
  if (currentScope === 'day') {
    columnHeaders = ['今日状态', '-', '-', '-', '-', '-', '-'];
  } else if (currentScope === 'month') {
    columnHeaders = ['第一周', '第二周', '第三周', '第四周', '余下天', '-', '-'];
  } else if (currentScope === 'year') {
    columnHeaders = ['第一季度', '第二季度', '第三季度', '第四季度', '-', '-', '-'];
  } else {
    columnHeaders = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
  }

  columnHeaders.forEach(title => { html += `<div class="week-header-cell">${title}</div>`; });
  html += '<div class="time-col">';
  for(let i=0; i<24; i++) { html += `<div class="time-slot">${String(i).padStart(2,'0')}:00</div>`; }
  html += '</div>';

  for(let d=0; d<7; d++) { html += `<div class="day-col" id="day-col-${d}"></div>`; }
  weekGrid.innerHTML = html;

  historyLogs.forEach(log => {
    let targetIdx = (currentScope === 'day') ? 0 : log.day;
    const targetCol = document.getElementById(`day-col-${targetIdx}`);
    if (targetCol) {
      const h = log.startHour; const m = log.startMin;
      const block = document.createElement('div');
      const matched = plans.find(p => p.name === log.taskName);
      const themeColor = matched ? matched.color : '#ffbc00';
      
      block.style.cssText = `
        position: absolute; left: 2px; right: 2px; 
        border-left: 3px solid ${themeColor}; 
        background: linear-gradient(90deg, ${themeColor}35, ${themeColor}10); 
        border-radius: 4px; padding: 4px; font-size: 11px; color: #fff; 
        overflow: hidden; z-index: 99; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
      `;
      
      const topPos = (h * 40) + (m * 0.6666);
      const blockHeight = Math.max(26, log.duration * 0.6666);
      block.style.top = `${topPos}px`; 
      block.style.height = `${blockHeight}px`;
      
      block.innerHTML = `
        <div style="font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#fff;">${log.taskName}</div>
        <div style="font-size:9px; color:#ffbc00; margin-top:1px;">${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')} (${log.duration}分)</div>
      `;
      targetCol.appendChild(block);
    }
  });
}

// 首次初始化
renderMemos();
updateDisplay(true);
</script>
</body>
